<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Steps → KM kalkulator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: #1c1c1c;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 300px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
        width: 80%;
        padding: 10px;
        margin: 15px 0;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        text-align: center;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #28a745;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }

    .result {
        margin-top: 20px;
        font-size: 22px;
        color: #00ff99;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Koraci → KM</h2>

    <input type="number" id="steps" placeholder="Unesi korake">

    <br>
    <button onclick="convert()">Izračunaj</button>

    <div class="result" id="result">0 km</div>
</div>

<script>
    function convert() {
        let steps = document.getElementById("steps").value;

        // faktor iz tvog primjera
        let factor = 1.8 / 2658;

        let km = steps * factor;

        document.getElementById("result").innerText = km.toFixed(2) + " km";
    }
</script>

</body>
</html>
